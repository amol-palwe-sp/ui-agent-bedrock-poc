# Defaults for local POC. Newer models (e.g. Claude 4.x) need an inference profile ARN or profile id — see README.
aws.region=us-east-1
aws.profile=default

# Active model (env BEDROCK_MODEL_ID overrides this line).
# On-demand-friendly default:
# bedrock.model.id=anthropic.claude-3-5-sonnet-20241022-v2:0
#
# For Claude Sonnet 4.6 via inference profile, comment the line above and uncomment ONE of:
#bedrock.model.id=arn:aws:bedrock:us-east-1:406205545357:inference-profile/global.anthropic.claude-sonnet-4-6
bedrock.model.id=arn:aws:bedrock:us-east-1:406205545357:inference-profile/global.anthropic.claude-haiku-4-5-20251001-v1:0
# bedrock.model.id=global.anthropic.claude-sonnet-4-6

anthropic.max_tokens=4096
anthropic.temperature=0
agent.max_steps=20
browser.headless=false
browser.slow_mo_ms=0

# Screenshot optimization
# format: jpeg (smaller, ~40-80 KB) or png (lossless, ~200-400 KB)
screenshot.format=jpeg
# JPEG quality 0-100 — 70 is a good balance of clarity vs token cost
screenshot.jpeg.quality=70

# Viewport size (smaller = fewer tokens in the image)
browser.viewport.width=1024
browser.viewport.height=640
