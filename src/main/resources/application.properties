# Defaults for local POC. Newer models (e.g. Claude 4.x) need an inference profile ARN or
# profile id — see README.
aws.region=us-east-1
aws.profile=default

# Active model (env BEDROCK_MODEL_ID overrides this line).
# On-demand-friendly default:
# bedrock.model.id=anthropic.claude-3-5-sonnet-20241022-v2:0
#
# For Claude Sonnet 4.6 via inference profile, comment the line above and uncomment ONE of:
#bedrock.model.id=arn:aws:bedrock:us-east-1:406205545357:inference-profile/global.anthropic.claude-haiku-4-5-20251001-v1:0
bedrock.model.id=arn:aws:bedrock:us-east-1:406205545357:inference-profile/global.anthropic.claude-sonnet-4-6
# bedrock.model.id=arn:aws:bedrock:us-east-1:406205545357:inference-profile/global.anthropic.claude-haiku-4-5-20251001-v1:0
# bedrock.model.id=global.anthropic.claude-sonnet-4-6

anthropic.max_tokens=4096
anthropic.temperature=0

# --- Agent settings ---
agent.max_steps=20

# JSONL action outcome log (set to none to disable)
agent.log.file=./agent-run.jsonl

# Consecutive no-progress steps before stuck-warning is injected into history
agent.no_progress_limit=3

# --- Browser ---
browser.headless=false
browser.slow_mo_ms=0

# Maximise the window on headed runs; use fullscreen.width/height for headless.
browser.start.maximized=true
browser.fullscreen.width=1920
browser.fullscreen.height=1080

# --- Screenshot optimization ---
# format: jpeg (smaller, ~40-80 KB) or png (lossless, ~200-400 KB)
screenshot.format=jpeg
# JPEG quality 0-100 — 70 is a good balance of clarity vs token cost
screenshot.jpeg.quality=70

# Viewport size (used when start.maximized=false)
browser.viewport.width=1024
browser.viewport.height=640

# --- Per-action timeouts ---
browser.action.timeout.click.ms=8000
browser.action.timeout.type.ms=5000
browser.action.timeout.navigate.ms=90000

# Inter-action delay upper bound (ms). 0 = no delay. >0 = random jitter up to this value
# between each action, introducing human-like pacing.
browser.inter.action.delay.ms=0

# --- Video frame extraction (for runVideo task) ---
# Maximum number of frames to extract from video
video.max.frames=80
# Minimum pixel change percentage (0.02 = 2%) to consider a frame significant
video.change.threshold=0.02
# Minimum time gap (seconds) between extracted frames
video.min.gap.seconds=0.5
# Directory to save debug frames (leave blank to disable)
video.debug.frames.dir=/Users/amol.palwe/Desktop/DisconnectedApps/ui-agent-bedrock-poc/src/main/resources/Frames
